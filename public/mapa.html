<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MediTrack Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
  #map { width: 100%; height: 100%; }
  .leaflet-popup-content { min-width: 200px; }
  .btn-nav { display: inline-flex; align-items: center; justify-content: center; gap: 4px; flex: 1; padding: 8px; border-radius: 10px; color: #fff; text-decoration: none; text-align: center; font-size: 12px; font-weight: 700; }
  .btn-waze { background: #33ccff; }
  .btn-maps { background: #4285f4; }
  .btn-update { margin-top: 8px; width: 100%; padding: 7px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; }
  .btn-update:hover { background: #f8fafc; }
</style>
</head>
<body>
<div id="map"></div>
<script>
(function() {
  // Inicializar mapa centrado en Colombia
  var map = L.map('map', { zoomControl: true, tap: false }).setView([4.658, -74.094], 13);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  var markers = []; // Para clientes o puntos de ruta
  var userMarkersArr = []; // Para otros usuarios (vendedores, repartidores)
  var userMarker = null; // Mi propia ubicación
  var routeLayer = null;
  var routeActive = false; // true después de calcular ruta para proteger los marcadores numerados

  // Icono de droguería (modo gestión)
  function makeIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:17px;">🏪</div>',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -22]
    });
  }

  // Icono numerado (modo ruta activa) — fondo azul con número de orden
  function makeNumberedIcon(number) {
    return L.divIcon({
      className: '',
      html: '<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:3px solid #fff;box-shadow:0 4px 12px rgba(59,130,246,.5);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;">' + number + '</div>',
      iconSize: [40, 40],
      iconAnchor: [20, 20],
      popupAnchor: [0, -24]
    });
  }

  // Icono de usuario (punto azul pulsante)
  function makeUserIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;border-radius:50%;background:#3b82f6;border:3px solid #fff;box-shadow:0 0 0 6px rgba(59,130,246,.2),0 2px 8px rgba(0,0,0,.25)"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });
  }

  function makeRepartidorIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:17px;">🏍️</div>',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -22]
    });
  }

  function makeVendedorIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#d97706);border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:17px;">💼</div>',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -22]
    });
  }

  function makeAdminIcon() {
    return L.divIcon({
      className: '',
      html: '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:17px;">🛡️</div>',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -22]
    });
  }

  function popupHTML(c) {
    var nombre = c.nombre || c.cliente_nombre || 'Desconocido';
    var cid = c.id || c.cliente_id;
    var html = '<div style="font-family:system-ui">';
    html += '<b style="font-size:14px;color:#0f172a">' + nombre + '</b>';
    if (c.direccion) html += '<br><span style="font-size:12px;color:#64748b">📍 ' + c.direccion + '</span>';
    if (c.ciudad) html += '<br><span style="font-size:12px;color:#64748b">🏙️ ' + c.ciudad + '</span>';
    if (c.telefono) html += '<br><span style="font-size:12px;color:#64748b">📞 ' + c.telefono + '</span>';
    html += '<div style="display:flex;gap:6px;margin-top:10px">';
    html += '<a href="https://waze.com/ul?ll=' + c.latitud + ',' + c.longitud + '&navigate=yes" target="_blank" rel="noopener" class="btn-nav btn-waze">🧭 Waze</a>';
    html += '<a href="https://www.google.com/maps/dir/?api=1&destination=' + c.latitud + ',' + c.longitud + '" target="_blank" rel="noopener" class="btn-nav btn-maps">📍 Maps</a>';
    html += '</div>';
    html += '<button class="btn-update" onclick="requestUpdateLocation(\'' + cid + '\',\'' + nombre.replace(/'/g, "\\'") + '\')">🔄 Actualizar ubicación</button>';
    html += '</div>';
    return html;
  }

  // ── Comunicación con React vía postMessage ──
  window.addEventListener('message', function(event) {
    var data = event.data;
    if (!data || !data.type) return;

    if (data.type === 'SET_MARKERS') {
      // Si la ruta ya está activa, ignorar SET_MARKERS para no borrar los números de orden
      if (routeActive) return;

      // Modo gestión: mostrar todos los clientes con sus íconos de tienda
      markers.forEach(function(m) { map.removeLayer(m); });
      markers = [];
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
      var bounds = [];

      (data.clientes || []).forEach(function(c) {
        if (c && c.latitud && c.longitud) {
          var m = L.marker([c.latitud, c.longitud], { icon: makeIcon() })
            .bindPopup(popupHTML(c), { maxWidth: 270 })
            .addTo(map);
          markers.push(m);
          bounds.push([c.latitud, c.longitud]);
        }
      });

      if (data.userPos) {
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([data.userPos.lat, data.userPos.lng], { icon: makeUserIcon() })
          .bindPopup('<b style="font-size:13px">📍 Mi ubicación</b>')
          .addTo(map);
        bounds.push([data.userPos.lat, data.userPos.lng]);
      }

      if (data.fitBounds !== false) {
        if (bounds.length > 1) {
          map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
        } else if (bounds.length === 1) {
          map.setView(bounds[0], 15);
        }
      }
    }

    if (data.type === 'UPDATE_USERS_GPS') {
      if (routeActive) return;
      
      userMarkersArr.forEach(function(m) { map.removeLayer(m); });
      userMarkersArr = [];

      (data.usuarios || []).forEach(function(u) {
        if (u && u.latitud && u.longitud) {
          var icon = makeVendedorIcon();
          if (u.role === 'repartidor') icon = makeRepartidorIcon();
          if (u.role === 'admin') icon = makeAdminIcon();
          
          var popupStr = '<div style="font-family:system-ui"><b style="font-size:14px;color:#0f172a">' + (u.nombre_completo || 'Usuario') + '</b><br><span style="font-size:12px;color:#64748b">' + (u.role || '').toUpperCase() + '</span><br><span style="font-size:11px;color:#94a3b8">GPS: ' + new Date(u.ultima_actualizacion).toLocaleTimeString() + '</span></div>';
          
          var m = L.marker([u.latitud, u.longitud], { icon: icon })
            .bindPopup(popupStr, { maxWidth: 270 })
            .addTo(map);
          userMarkersArr.push(m);
        }
      });
    }

    if (data.type === 'SET_CENTER') {
      map.setView([data.lat, data.lng], data.zoom || 13);
    }

    if (data.type === 'UPDATE_USER_POS') {
      if (data.userPos) {
        if (userMarker) {
          userMarker.setLatLng([data.userPos.lat, data.userPos.lng]);
        } else {
          userMarker = L.marker([data.userPos.lat, data.userPos.lng], { icon: makeUserIcon() })
            .bindPopup('<b style="font-size:13px">📍 Mi ubicación</b>')
            .addTo(map);
        }
      }
    }

    if (data.type === 'CALCULATE_ROUTE') {
      calculateRoute(data.clientes, data.userPos);
    }

    if (data.type === 'RESET_ROUTE') {
      // Limpiar ruta y volver al modo gestión (SET_MARKERS funcionará de nuevo)
      routeActive = false;
      markers.forEach(function(m) { map.removeLayer(m); });
      markers = [];
      userMarkersArr.forEach(function(m) { map.removeLayer(m); });
      userMarkersArr = [];
      if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    }
  });

  // ── Motor de Enrutamiento con OSRM Trip API ──
  async function calculateRoute(clientes, userPos) {
    if (!userPos) {
      window.parent.postMessage({ type: 'ROUTE_ERROR', message: 'GPS no disponible' }, '*');
      return;
    }
    if (!clientes || clientes.length === 0) {
      window.parent.postMessage({ type: 'ROUTE_ERROR', message: 'Sin clientes para enrutar' }, '*');
      return;
    }

    // Limpiar ruta anterior
    routeActive = false;
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }

    // Construir string de coordenadas: primero userPos, luego clientes con GPS
    var coords = [userPos.lng + ',' + userPos.lat];
    var clientsByIndex = [];

    clientes.forEach(function(c) {
      if (c.latitud && c.longitud) {
        coords.push(c.longitud + ',' + c.latitud);
        clientsByIndex.push(c);
      }
    });

    if (clientsByIndex.length === 0) {
      window.parent.postMessage({ type: 'ROUTE_ERROR', message: 'Ningún cliente tiene GPS registrado' }, '*');
      return;
    }

    var url = 'https://router.project-osrm.org/trip/v1/driving/' +
      coords.join(';') +
      '?roundtrip=false&source=first&geometries=geojson';

    try {
      window.parent.postMessage({ type: 'ROUTE_LOADING', loading: true }, '*');

      var response = await fetch(url);
      var apiData = await response.json();

      if (apiData.code !== 'Ok') {
        throw new Error(apiData.message || 'Error en OSRM');
      }

      var trip = apiData.trips[0];
      var waypoints = apiData.waypoints;

      // Dibujar línea azul de la ruta
      var latlngs = trip.geometry.coordinates.map(function(c) { return [c[1], c[0]]; });
      routeLayer = L.polyline(latlngs, {
        color: '#3b82f6',
        weight: 6,
        opacity: 0.85,
        lineJoin: 'round',
        lineCap: 'round'
      }).addTo(map);

      // Limpiar pines anteriores
      markers.forEach(function(m) { map.removeLayer(m); });
      markers = [];
      userMarkersArr.forEach(function(m) { map.removeLayer(m); });
      userMarkersArr = [];

      // Reconstruir orden óptimo de clientes
      // OSRM devuelve el array de waypoints en el mismo orden exacto en que enviamos las coordenadas.
      // Le inyectamos manualmente su índice original (0=userPos, 1..N=clientes)
      waypoints.forEach(function(wp, i) {
        wp.original_index = i;
      });

      // waypoint_index indica la posición de este punto en el viaje optimizado.
      var sortedWaypoints = waypoints.slice().sort(function(a, b) { return a.waypoint_index - b.waypoint_index; });

      // DEBUG: ver qué devuelve OSRM exactamente
      console.log('[OSRM] waypoints:', JSON.stringify(waypoints));
      console.log('[OSRM] sortedWaypoints:', JSON.stringify(sortedWaypoints));
      console.log('[OSRM] clientsByIndex count:', clientsByIndex.length);

      var orderedClients = [];
      sortedWaypoints.forEach(function(wp) {
        if (wp.original_index === 0) return; // Saltar userPos (primer coord enviado)
        var clientIdx = wp.original_index - 1; // -1 porque coords[0] = userPos
        var c = clientsByIndex[clientIdx];
        if (c) {
          orderedClients.push({ client: c, displayOrder: orderedClients.length + 1 });
        } else {
          console.warn('[OSRM] original_index sin cliente mapeado:', wp.original_index);
        }
      });

      // Si OSRM no devolvió waypoints útiles, usar el orden original como fallback
      if (orderedClients.length === 0) {
        console.warn('[OSRM] Fallback: usando orden original de clientes');
        clientsByIndex.forEach(function(c, idx) {
          orderedClients.push({ client: c, displayOrder: idx + 1 });
        });
      }

      console.log('[OSRM] orderedClients count:', orderedClients.length, orderedClients.map(function(x){ return x.displayOrder + ':' + (x.client.nombre || x.client.cliente_nombre); }));

      // Redibujar pines numerados y calcular bounds
      var bounds = [[userPos.lat, userPos.lng]];
      orderedClients.forEach(function(item) {
        var c = item.client;
        if (c && c.latitud && c.longitud) {
          var m = L.marker([c.latitud, c.longitud], { icon: makeNumberedIcon(item.displayOrder) })
            .bindPopup(popupHTML(c), { maxWidth: 270 })
            .addTo(map);
          markers.push(m);
          bounds.push([c.latitud, c.longitud]);
        }
      });

      // Re-dibujar punto azul del usuario encima de los marcadores numerados
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([userPos.lat, userPos.lng], { icon: makeUserIcon() })
        .bindPopup('<b style="font-size:13px">📍 Mi ubicación</b>')
        .addTo(map);

      // Marcar ruta como activa para proteger los marcadores numerados
      routeActive = true;

      map.fitBounds(bounds, { padding: [50, 50] });

      // ── Construir URLs de navegación externa ──

      // Waze: solo hacia la PRÓXIMA entrega (orden 1)
      var wazeUrl = '';
      var googleMapsUrl = '';
      var nextClientName = '';
      var orderedClientIds = orderedClients.map(function(item) { return item.client.cliente_id || item.client.id; });

      if (orderedClients.length > 0) {
        var nextStop = orderedClients[0].client;
        if (nextStop && nextStop.latitud && nextStop.longitud) {
          nextClientName = nextStop.nombre || nextStop.cliente_nombre || '';
          wazeUrl = 'https://waze.com/ul?ll=' + nextStop.latitud + ',' + nextStop.longitud + '&navigate=yes';
        }

        // Google Maps: origin → waypoints intermedios → destination
        var lastStop = orderedClients[orderedClients.length - 1].client;
        if (lastStop && lastStop.latitud && lastStop.longitud) {
          googleMapsUrl = 'https://www.google.com/maps/dir/?api=1';
          googleMapsUrl += '&origin=' + userPos.lat + ',' + userPos.lng;
          googleMapsUrl += '&destination=' + lastStop.latitud + ',' + lastStop.longitud;

          // Google Maps permite hasta 8 waypoints intermedios (gratuito)
          var intermediates = orderedClients.slice(0, orderedClients.length - 1);
          if (intermediates.length > 0) {
            var wps = intermediates
              .filter(function(item) { return item.client && item.client.latitud && item.client.longitud; })
              .map(function(item) { return item.client.latitud + ',' + item.client.longitud; })
              .join('|');
            if (wps) googleMapsUrl += '&waypoints=' + encodeURIComponent(wps);
          }
        }
      }

      // Notificar a React con todos los datos
      window.parent.postMessage({
        type: 'ROUTE_INFO',
        distance: trip.distance,
        duration: trip.duration,
        googleMapsUrl: googleMapsUrl,
        wazeUrl: wazeUrl,
        nextClientName: nextClientName,
        orderedClientIds: orderedClientIds
      }, '*');

    } catch (e) {
      console.error('[OSRM Error]', e);
      window.parent.postMessage({ type: 'ROUTE_ERROR', message: e.message }, '*');
    } finally {
      window.parent.postMessage({ type: 'ROUTE_LOADING', loading: false }, '*');
    }
  }

  // Solicitar actualización de ubicación → enviar a React
  window.requestUpdateLocation = function(id, nombre) {
    map.closePopup();
    window.parent.postMessage({ type: 'UPDATE_LOCATION', clienteId: id, clienteNombre: nombre }, '*');
  };

  // Notificar a React que el mapa está listo
  window.parent.postMessage({ type: 'MAP_READY' }, '*');
})();
</script>
</body>
</html>
